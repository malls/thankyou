<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{.ViewBoxWidth}} {{.ViewBoxHeight}}" preserveAspectRatio="xMidYMid meet">
	<!--
		Print-ready template. Geometry mirrors the in-browser SVG in
		index.html as closely as possible — same font-size (320 ≈ 20em at
		16px root), same letter-spacing (-25 ≈ -0.08em at 320), same dy
		(228 between main lines, 150 to the footer). resvg scales the
		viewBox up to whatever pixel size the renderer asks for, so we get
		the same dense, slightly-overlapping look the browser produces
		without having to commit to print-area pixel coordinates here.

		The viewBox width is computed in Go from the longer of MainText
		and MiddleText (see template.go) — same idea as the browser's
		getBBox-based dynamic sizing. Each char advances ~240 user units
		at font-size 320, plus a fixed safety margin. Setting it per-render
		means short inputs get a tight crop (text fills the canvas) and
		long inputs get extra width.

		Height 1880 is fixed: ascent room (40) + first cap-height (~234) +
		6 dy of 228 (1368) + footer dy 150 + footer descent (~80) ≈ 1872.
		Text starts at y=40 so the first line's cap-top sits cleanly
		inside the viewBox rather than scraping y=0.

		preserveAspectRatio "meet" letterboxes the SVG into whatever pixel
		size resvg renders. With output 3600x4800 (aspect 0.75) and viewBox
		aspect varying with text length, the rendered image gets vertical
		padding for short inputs (text sits in the upper portion of the
		canvas) and shrinks horizontally for very long inputs. Either way
		the text never clips.
	-->
	<style>
		text {
			font-family: 'Helvetica Black', Helvetica, Arial, sans-serif;
			fill: red;
			stroke: red;
		}

		.main-text {
			text-transform: uppercase;
			stroke-width: 2px;
			letter-spacing: -25;
			font-size: 320;
		}

		.hollow {
			fill: white;
		}

		.bottom-text {
			font-size: 100;
			text-align: start;
		}
	</style>
	<rect x="0" y="0" width="100%" height="100%" fill="{{.Background}}" />

	<text y="40">
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="20" dy="228" class="main-text" id="filled-text">{{.MiddleText}}</tspan>
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="20" dy="228" class="main-text hollow">{{.MainText}}</tspan>
		<tspan x="200" dy="150" class="bottom-text">thankyoubag.online</tspan>
	</text>

</svg>
